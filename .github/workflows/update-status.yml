name: Update status.json timestamp

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes (UTC)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: status-json
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up git identity
        run: |
          git config user.name "whenithappensapp"
          git config user.email "whenithappensapp@users.noreply.github.com"

      - name: Update status.json updated_at (UTC ISO-8601)
        run: |
          python3 - <<'PY'
          import json
          from datetime import datetime, timezone
          path = "status.json"
          with open(path, "r", encoding="utf-8") as f:
              data = json.load(f)
          data["updated_at"] = datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z")
          with open(path, "w", encoding="utf-8") as f:
              json.dump(data, f, indent=2)
              f.write("\n")
          PY

      - name: Commit and push (even if only timestamp changed)
        run: |
          git add status.json
          git commit -m "Auto update timestamp" || echo "No changes"
          git pull --rebase origin main
          git push origin main
